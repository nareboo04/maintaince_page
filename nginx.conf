# Cloudflare already handles: geo restriction, WAF, credential-leak rate limiting.
# Nginx's job here is only to block traffic that bypasses Cloudflare entirely
# (someone hitting the origin IP directly, skipping all CF rules).

# geo uses the raw TCP connection IP (before real-IP substitution) — exactly what
# we want for the bypass check.
geo $is_cloudflare {
    default          0;

    # Cloudflare IPv4 (https://www.cloudflare.com/ips/)
    173.245.48.0/20  1;
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    141.101.64.0/18  1;
    108.162.192.0/18 1;
    190.93.240.0/20  1;
    188.114.96.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;
    162.158.0.0/15   1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    172.64.0.0/13    1;
    131.0.72.0/22    1;

    # Cloudflare IPv6
    2400:cb00::/32   1;
    2606:4700::/32   1;
    2803:f800::/32   1;
    2405:b500::/32   1;
    2405:8100::/32   1;
    2a06:98c0::/29   1;
    2c0f:f248::/32   1;
}

# Backstop rate limit — much looser than CF's 10r/10s because CF already
# dropped the bad actors before they reach here. This just stops a flood
# that somehow slips through (e.g. CF misconfiguration or IP not in list yet).
limit_req_zone  $binary_remote_addr zone=main:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;

    # Restore real client IP from Cloudflare header so logs and rate limiting
    # see the actual visitor, not a Cloudflare edge node.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    root /usr/share/nginx/html;

    # ── Primary defence: drop anything not from a Cloudflare edge node ──────
    # This makes CF geo/WAF/rate rules non-bypassable from the origin side.
    if ($is_cloudflare = 0) {
        return 444;
    }

    # ── Backstop limits (CF already filtered the worst) ─────────────────────
    client_max_body_size  1k;
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    limit_req  zone=main burst=50 nodelay;
    limit_conn addr 20;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"   always;

    # ── Routing ──────────────────────────────────────────────────────────────

    # Serve maintenance page at root
    location = / {
        try_files /index.html =404;
    }

    # Silent-drop script-extension probes
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb|env|sql)$ {
        return 444;
    }

    # Silent-drop hidden-file probes (.env, .git, etc.)
    location ~ /\. {
        return 444;
    }

    # Redirect everything else to root
    location / {
        return 301 /;
    }
}
