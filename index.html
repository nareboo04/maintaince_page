<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>We are under maintenance</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 20px 50px rgba(0,0,0,.4);
      max-width: 420px;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: .5px;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      color: #cbd5f5;
    }

    .bar {
      margin-top: 28px;
      height: 8px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 40%;
      background: repeating-linear-gradient(
        45deg,
        #facc15,
        #facc15 10px,
        #111827 10px,
        #111827 20px
      );
      animation: move 1s linear infinite;
    }

    @keyframes move {
      from { background-position: 0 0; }
      to   { background-position: 40px 0; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🚧👷‍♂️</div>
    <h1>We are under maintenance</h1>
    <p>
      Sorry for the inconvenience.<br>
      We are working hard to improve the system.<br>
      Please check back again soon.
    </p>

    <div class="bar">
      <span></span>
    </div>
  </div>
</body>
</html>
