services:
  maintenance:
    image: nginx:alpine
    container_name: maintenance-page
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
        reservations:
          cpus: "0.10"
          memory: 16M